apiVersion: certificatemanager.cnrm.cloud.google.com/v1beta1
kind: CertificateManagerCertificate
metadata:
  annotations:
    cnrm.cloud.google.com/management-conflict-prevention-policy: none
    cnrm.cloud.google.com/state-into-spec: absent
  finalizers:
  - cnrm.cloud.google.com/finalizer
  - cnrm.cloud.google.com/deletion-defender
  generation: 1
  labels:
    cnrm-test: "true"
  name: certificatemanagercertificate-kompanion-${uniqueId}
  namespace: ${uniqueId}
spec:
  description: sample managed certificate for kcc
  location: global
  managed:
    domains:
    - '*.${uniqueId}.com'
    - test.${uniqueId}.com
    - test2.${uniqueId}.com
    issuanceConfigRef:
      external: projects/${projectId}/locations/global/certificateIssuanceConfigs/my-test-ic
  projectRef:
    external: ${projectId}
  scope: ALL_REGIONS
status:
  conditions:
  - lastTransitionTime: "1970-01-01T00:00:00Z"
    message: 'Update call failed: error applying desired state: summary: Error waiting
      to create Certificate: Error waiting for Creating Certificate: Error code 3,
      message: invalid name'
    reason: UpdateFailed
    status: "False"
    type: Ready
  observedGeneration: 1
